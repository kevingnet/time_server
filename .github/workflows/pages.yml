name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Build Angular client
        working-directory: client
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          npm ci --legacy-peer-deps
          npm run build -- --configuration production
          touch dist/angular-registration-login-example/.nojekyll
          cp dist/angular-registration-login-example/index.html dist/angular-registration-login-example/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist/angular-registration-login-example
      - id: deployment
        uses: actions/deploy-pages@v4
